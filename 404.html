<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        .bg-element {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .bg-element-1 {
            width: 300px;
            height: 300px;
            background: #fff;
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .bg-element-2 {
            width: 200px;
            height: 200px;
            background: #fff;
            bottom: -100px;
            right: -100px;
            animation-delay: 2s;
        }

        .bg-element-3 {
            width: 250px;
            height: 250px;
            background: #fff;
            top: 50%;
            right: -125px;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(30px);
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            max-width: 600px;
            padding: 40px 20px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 404 Text with animation */
        .error-code {
            font-family: 'Syne', sans-serif;
            font-size: clamp(80px, 15vw, 180px);
            font-weight: 800;
            color: #fff;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            letter-spacing: -3px;
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Digit animation */
        .digit {
            display: inline-block;
            animation: bounce 0.6s ease-out;
        }

        .digit:nth-child(2) {
            animation-delay: 0.1s;
        }

        .digit:nth-child(3) {
            animation-delay: 0.2s;
        }

        @keyframes bounce {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 700;
            animation: fadeInDelay 0.8s ease-out 0.3s both;
        }

        p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            line-height: 1.6;
            animation: fadeInDelay 0.8s ease-out 0.5s both;
        }

        @keyframes fadeInDelay {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInDelay 0.8s ease-out 0.7s both;
        }

        button {
            padding: 14px 32px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: #fff;
            color: #667eea;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border: 2px solid #fff;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        button:active {
            transform: translateY(-1px);
        }

        /* Decorative elements */
        .decoration {
            position: relative;
            height: 60px;
            margin: 30px 0;
            animation: fadeInDelay 0.8s ease-out 0.4s both;
        }

        .star {
            position: absolute;
            font-size: 24px;
            animation: twinkle 2s ease-in-out infinite;
        }

        .star:nth-child(1) {
            left: 10%;
            animation-delay: 0s;
        }

        .star:nth-child(2) {
            right: 15%;
            animation-delay: 0.5s;
        }

        .star:nth-child(3) {
            left: 20%;
            top: 30px;
            animation-delay: 1s;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            p {
                font-size: 1rem;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9rem;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-element bg-element-1"></div>
    <div class="bg-element bg-element-2"></div>
    <div class="bg-element bg-element-3"></div>

    <!-- Main content -->
    <div class="container">
        <div class="error-code">
            <span class="digit">4</span><span class="digit">0</span><span class="digit">4</span>
        </div>
        
        <div class="decoration">
            <span class="star">✨</span>
            <span class="star">⭐</span>
            <span class="star">✨</span>
        </div>

        <h1>Page Not Found</h1>
        <p>Looks like you've ventured into uncharted territory. The page you're looking for doesn't exist or has moved.</p>

        <div class="button-group">
            <button class="btn-primary" onclick="goHome()">Go Home</button>
            <button class="btn-secondary" onclick="goBack()">Go Back</button>
        </div>
    </div>

    <script>
        function goHome() {
            window.location.href = '/';
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
