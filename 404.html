<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Lost in Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --accent: #95BF47;
            --accent-2: #00E5FF;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Portfolio style background blobs */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: move 10s infinite alternate ease-in-out;
        }

        @keyframes move {
            from {
                transform: translate(-10%, -10%) scale(1);
            }

            to {
                transform: translate(10%, 10%) scale(1.1);
            }
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        .error-code {
            font-family: 'Syne', sans-serif;
            font-size: clamp(100px, 20vw, 250px);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(to bottom, #fff, rgba(255, 255, 255, 0.1));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        .error-code::after {
            content: "404";
            position: absolute;
            left: 2px;
            top: 2px;
            z-index: -1;
            -webkit-text-stroke: 1px var(--accent);
            -webkit-text-fill-color: transparent;
            opacity: 0.5;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-top: -20px;
            margin-bottom: 15px;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            max-width: 450px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }

        .btn-wrap {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(149, 191, 71, 0.4);
        }

        .btn-outline {
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #fff;
        }

        /* Glitch effect animation */
        .glitch {
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% {
                transform: skew(0deg);
            }

            2% {
                transform: skew(10deg);
            }

            4% {
                transform: skew(-10deg);
            }

            6% {
                transform: skew(0deg);
            }
        }
    </style>
</head>

<body>
    <div class="blob"></div>

    <div class="container">
        <div class="error-code glitch">404</div>
        <h1>Oops! Page Not Found</h1>
        <p>This page may have been deleted or you may have come to the wrong address. Don't worry, you can use the links
            shown below.</p>

        <div class="btn-wrap">
            <a href="index.html" class="btn btn-primary">Back to Home</a>
            <a href="index.html#projects" class="btn btn-outline">My Projects</a>
        </div>
    </div>
</body>

</html>
